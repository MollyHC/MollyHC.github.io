<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.3">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway|Sofia|Tangerine|Charm|Herr Von Muellerhoff">
    <title>Wild Wicker</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: url('./images/spiral_tray_1.9mb.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Georgia', serif; 
        }

        header {
            width: 60%;
            margin-top: 20px;
            text-align: center;
        }

        footer {
            width: 60%;
            margin-bottom: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Media query for desktop and tablet screens */
        @media (min-width: 768px) {
           header, footer {
               width: 20%; /* Occupy the left third of the screen */
               padding-left: 10%; /* Add some left padding for better alignment */
               position: fixed;
               display: flex;
               flex-direction: column;
               align-items: flex-start; /* Align content to the left */
            }

            header {
               left: 0;
               top: 0;
            }

            footer {
               left: 0;
               bottom: 0;
            }
        }

        h1 {
            font-size: 75px;
            margin: 0;
            font-family: "Herr Von Muellerhoff"; font-weight: normal;
            font-weight: normal;
        }

        h2 {
            font-size: 20px;
            margin: 0;
            font-weight: normal
        }
       
        p { margin: 10px 0 !important}

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: black;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        .text-box {
            position: fixed;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 90%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Ensure content starts from the top */
            align-items: center;
            background: black;
            color: white; /* white text */
            padding: 20px;
            box-sizing: border-box;
            z-index: 2;
            overflow-y: auto; /* Enable vertical scrolling */
            overflow-x: hidden; /* Disable horizontal scrolling */
            border-top: 10px solid black; /* Add border top */
            border-bottom: 10px solid black; /* Add border bottom */
        }
    
        .text-box::before,
        .text-box::after {
            content: '';
            display: block;
            width: 100%;
            height: 10px; /* Height of the internal border */
            background: black;
        }

        .text-box::before {
            top: 0;
        }

        .text-box::after {
            bottom: 0;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 20px;
            color: white;
            border: none;
            background: transparent;
            z-index: 3; /* Ensure close button appears above border */
        }

        .text-content img.small-image {
            display: block;
            margin: 20px auto; /* Center the image horizontally and add margin */
            width: 20%; /* Adjust width as needed */
            max-width: 200px; /* max width to ensure it doesn't get too large */
            height: auto;
        }

        .text-content {
            width: 100%;
            text-align: center;
            padding: 0px 20px; /* Adjust padding to avoid text touching the sides */
            box-sizing: border-box;
        }

        .text-btn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            color: black;
            background-color: white;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        .padding-bottom {
            padding-bottom: 10px;
        }

        .padding-bottom-15 {
            padding-bottom: 15px;
        }

        .padding-bottom-25 {
            padding-bottom: 25px;
        }


        /* Carousel styles */
        .carousel-container {
            display: flex;
            overflow-x: scroll;
            width: 100%;
            scroll-behavior: smooth;
        }

        .carousel-container img {
            max-width: 600px;
            flex: 0 0 auto;
            width: 80%;
            margin: 0 10px;
            object-fit: cover;
        }

        .carousel-container::-webkit-scrollbar {
            height: 10px;
        }

        .carousel-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 0px;
        }

        .carousel-container::-webkit-scrollbar-track {
            background: #999;
        }

        .text-box::-webkit-scrollbar {
            width: 10px;
        }

        .text-box::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 0px;
        }

        .text-box::-webkit-scrollbar-track {
            background: #999;
        }

    </style>
</head>

<body>
    <header>
        <h1>Wild Wicker</h1>
        <h2 class="padding-bottom-15">basket weaving courses with contemporary basketmaker Clyde Hoare</h2>
        <div class="buttons-container">
            <button onclick="openTextBox('Courses')">Courses</button>
            <button onclick="openTextBox('Ethos')">Ethos</button>
            <button onclick="openTextBox('Baskets')">Baskets</button>
        </div>
    </header>

    <footer>
      <div class="buttons-container">
        <button onclick="window.location.href='https://www.instagram.com/wildwicker/'">find me on instagram</button>
      </div>
        <h2>Wobage Farm Craft Workshops</p>
        <h2>Upton Bishop</p>
        <h2>Ross-on-Wye</p>
        <h2>HR9 7RX</p>
    </footer>
    <script>
        function openTextBox(content) {
            const textBox = document.createElement('div');
            textBox.classList.add('text-box');

            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = 'X';
            closeBtn.classList.add('close-btn');
            closeBtn.onclick = function () {
                document.body.removeChild(textBox);
            };

            const textContent = document.createElement('div');
            textContent.classList.add('text-content');

             if (content === 'Courses') {
                 textContent.innerHTML = `<h1>${content}</h1>
                                 <p>I teach basketmaking in my workshop in a beautiful old barn at Wobage</p>
                                 <p>The introductory day course covers several techniques and will give you an understanding of basket making from its history to its place in the modern world</p>
                                 <p class="padding-bottom-25">Courses include many different functional designs and various applications of willow weaving, using willow I have grown at the bottom of Wobage's ancient Perry Orchard</p>
                                 <p>Introduction - you will make your very own large round willow basket</p>
                                 <p>Improvers - you will go on to make a large oval washing basket</p>
                                 <p class="padding-bottom-25">Garden Structures - you can make plant supports and willow panels</p>
                                 <p>I am happy to teach one to one or in groups</p>
                                 <p>Day courses start at £95 per person</p>
                                 <p>To book please get in touch via email or phone</p>
                                 <p class="padding-bottom-25">My email address is clyde@wildwicker.com and my phone number is 07866138436</p>

                                 <button class="text-btn" onclick="window.location.href='mailto:clyde@wilwicker.co.uk?subject=Subject%20Here'">please email me to book</button>`;
            } 
            else if (content === 'Ethos') {
                 textContent.innerHTML = `<h1>Journey</h1>
                                 <p>In Spring 2011, I waded head long into my first weave, with willow from a very helpful basket maker in Chepstow</p>
                                 <p>Enthusiastically reading the Basketmakers Association’s magazines, I discovered <i>The Worshipful Company of Basket Makers</i></p>
                                 <p>I was so fortunate in receiving their bursary, taking me to Ireland for a course with the one and only Joe Hogan</p>
                                 <p>This was a dream come true</p>
                                 <p>After two years learning from Joe, I came away a richer man</p>
                                 <p>In sessions with the talented Sally Goymer, her exceptional precision changed my perception further</p>
                                 <p>I hold great respect for Joe and Sally’s skill and patience, ever grateful to them for sharing with me their lifetime’s wealth of knowledge</p>
                                 <p>From cuttings of Joe’s collection, I started growing willow myself</p>
                                 <p>Varieties such as: Packing twine, Slender tip, Harrisons, Welsh white, and the basket makers mainstay Dicky Meadows create wonderful colours</p>
                                 <p>I love seeing the process through from field to basket; it keeps me in touch with the rhythms of nature, informing the way I work and feeding my creativity</p>
                                 
                                 <!--       add BA logo image       -->
                                 <img src="./BAlogo.png" alt="Basketmakers Association Logo" class="small-image">
                                 <p class="padding-bottom-25">  </p>

                                 <h1>Mindfulness</h1>
                                 <p>By its very nature, basket making encourages a mindful approach</p>
                                 <p>A sensory, meditative experience, giving us a deep sense of connection – in the relationship between weaving process and the basket’s form, as well as our own ties to the natural world</p>
                                 <p class="padding-bottom-25">Exercising our memory, activating spacial awareness and evoking our emotions and intuition; the rhythm of weaving rewards mind and body</p>
                                 
                                 <h1>Wobage</h1>                     
                                 <p>Wobage Farm Craft Workshops sit in the beautiful hills of South Herefordshire near Ross-on-Wye</p>
                                 <p>I sell my baskets in Wobage Makers Gallery with seven other talented craftspeople</p>
                                 <p class="padding-bottom-25">I enjoy our peaceful spot in the countryside, as well as the company and support of other makers</p>
                                 <p>Wobage Makers Gallery is open every Thursday, Friday and Saturday from 10am to 5pm (March - Christmas)</p>
                                 <p>We also host events, including my weaving demonstrations - please visit the Wobage website to find out what's coming up next</p>
                                 <button class="text-btn" onclick="window.location.href='https://www.wobage.co.uk/'">go to the Wobage website</button>
                                 <p class="padding-bottom-25">  </p>`;
            } 
            else if (content === 'Baskets') {
            textContent.innerHTML = `<h1>${content}</h1>
                                 <p>I sell my baskets at Wobage Farm Craft Workshops, alongside pottery, woodwork, prints and jewellery</p>
                                 <p class="padding-bottom-25">I also welcome commissions, please email me to discuss your ideas</p>
                                 <p class="padding-bottom-25">A gallery of my recent work:</p>
                                 <p class="padding-bottom-25">  </p>
                                 <div class="carousel-container">
                                             <img src="./oval-EDIT.jpg" alt="Oval basket">
                                             <img src="./forager.MP-EDIT.jpg" alt="Forager basket">
                                             <img src="./birdseye.jpg" alt="Willow weave">
                                             <img src="./gallery.jpg" alt="Hanging baskets">
                                             <img src="./handle.jpg" alt="Basket handle close up">
                                             <img src="./squarebaskets.jpg" alt="Pair of square baskets">
                                </div>
                                <p class="padding-bottom-25">  </p>`;
            }                    

            textBox.appendChild(closeBtn);
            textBox.appendChild(textContent);
            document.body.appendChild(textBox);
        }

    </script>
</body>

</html>
